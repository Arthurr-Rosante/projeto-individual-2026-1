<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Jurassic Park: Web Genesis</title>

    <!-- === Importação de Estilos === -->
    <link rel="stylesheet" href="./styles/global.css">
    <link rel="stylesheet" href="./styles/auth.css">

    <!-- === Importação de funções === -->
    <script defer src="./scripts/auth/toggle-password.js"></script>
    <script defer src="./scripts/auth/foliage-shake.js"></script>
    <script defer src="./scripts/auth/validations.js"></script>
    <script defer src="./scripts/utils/storage.js"></script>

    <!-- === Importação de Bibliotecas === -->
    <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/index.min.js"></script>
</head>
<body>
    <div class="form-wrapper">
        <!-- Gradiente de Fundo -->
        <div class="bg-gradient"></div>

        <!-- Formulário -->
        <form method="post" id="auth-form">
            <div class="form-header">
                <h2>JP Web Genesis</h2>
                <p>Realizar Cadastro</p>
            </div>
            <div class="form-body">
                <div class="field-group">
                    <div class="field">
                        <label class="field-label" for="ipt-email">Endereço de Email</label>
                        <input id="ipt-email" type="email"  oninput="validateEmail(this)" data-has-auth-errors="true" placeholder="Ex: drgrant@ingen.com" class="field-input" required>
                        <p id="ipt-email-auth-message" class="auth-message"></p>
                    </div>
                    <div class="field">
                        <label class="field-label" for="ipt-password">Código de Acesso (Senha)</label>
                        <div class="password-wrapper">
                            <input id="ipt-password" type="password" oninput="validatePassword(this)" data-has-auth-errors="true" placeholder="Min. 8 caracteres" minlength="8" class="field-input" required>
                            <i id="ipt-password-icon" class="ph ph-eye" onclick="togglePasswordVisiblity('ipt-password')"></i>
                        </div>
                        <p id="ipt-password-auth-message" class="auth-message"></p>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-btn" disabled><span>Requerer Acesso</span><i class="ph ph-caret-circle-up"></i></button>
                    <p id="form-auth-message" class="auth-message"></p>
                </div>
            </div>
            <div class="form-footer">
                <a href="./register.html">Não possui acesso? <span>Registre-se aqui</span></a>
            </div>
        </form>

        <!-- Folhagens Animadas -->
        <div id="foliage-patch-1" class="foliage-patch">
            <img src="./assets/svgs/foliage-1.svg" alt="Folhagem" data-shake-intensity="2" class="foliage foliage--light">
            <img src="./assets/svgs/foliage-3.svg" alt="Folhagem" data-shake-intensity="6" class="foliage foliage--mid">
            <img src="./assets/svgs/foliage-5.svg" alt="Folhagem" data-shake-intensity="-2" class="foliage foliage--dark">
        </div>
        <div id="foliage-patch-2" class="foliage-patch">
            <img src="./assets/svgs/foliage-2.svg" alt="Folhagem" data-shake-intensity="8" class="foliage foliage--mid">
            <img src="./assets/svgs/foliage-4.svg" alt="Folhagem" data-shake-intensity="-4" class="foliage foliage--light">
            <img src="./assets/svgs/foliage-2.svg" alt="Folhagem" data-shake-intensity="6" class="foliage foliage--dark">
        </div>
        <div id="foliage-patch-3" class="foliage-patch">
            <img src="./assets/svgs/foliage-5.svg" alt="Folhagem" data-shake-intensity="2" class="foliage foliage--dark">
            <img src="./assets/svgs/foliage-1.svg" alt="Folhagem" data-shake-intensity="8" class="foliage foliage--mid">
            <img src="./assets/svgs/foliage-3.svg" alt="Folhagem" data-shake-intensity="-2" class="foliage foliage--light">
        </div>
        <div id="foliage-patch-4" class="foliage-patch">
            <img src="./assets/svgs/foliage-1.svg" alt="Folhagem" data-shake-intensity="-4" class="foliage foliage--dark">
            <img src="./assets/svgs/foliage-2.svg" alt="Folhagem" data-shake-intensity="-6" class="foliage foliage--mid">
            <img src="./assets/svgs/foliage-5.svg" alt="Folhagem" data-shake-intensity="6" class="foliage foliage--light">
        </div>
        <div id="foliage-patch-5" class="foliage-patch">
            <img src="./assets/svgs/foliage-2.svg" alt="Folhagem" data-shake-intensity="8" class="foliage foliage--mid">
            <img src="./assets/svgs/foliage-5.svg" alt="Folhagem" data-shake-intensity="4" class="foliage foliage--dark">
            <img src="./assets/svgs/foliage-4.svg" alt="Folhagem" data-shake-intensity="-8" class="foliage foliage--light">
        </div>
        <div id="foliage-patch-6" class="foliage-patch">
            <img src="./assets/svgs/foliage-4.svg" alt="Folhagem" data-shake-intensity="2" class="foliage foliage--mid">
            <img src="./assets/svgs/foliage-1.svg" alt="Folhagem" data-shake-intensity="-4" class="foliage foliage--dark">
            <img src="./assets/svgs/foliage-2.svg" alt="Folhagem" data-shake-intensity="8" class="foliage foliage--light">
        </div>
    </div>

<!-- === SCRIPTS LOCAIS === -->
<script>
    const frm = document.getElementById("auth-form");
    const authBtn = document.getElementById("submit-btn");
    const authMsg = document.getElementById("form-auth-message");
    
    // Habilita/Desabilita o botão de envio caso o Formulário esteja Válido/Inválido
    frm.addEventListener("input", () => {
        const fields = frm.querySelectorAll(".field-input");
        const hasErrors = Array.from(fields).some(field => field.getAttribute("data-has-auth-errors") === "true");
        authBtn.disabled = hasErrors;
    });

    // Função que envia o Formulário
    frm.addEventListener("submit", (e) => {
        e.preventDefault();
        authMsg.innerText = "";

        const email = String(document.getElementById("ipt-email").value).trim();
        const password = String(document.getElementById("ipt-password").value).trim();

        console.log("[login.html] | Iniciando Login...");

        fetch("/api/users/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        })
        .then((response) => response.json().then((data) => {
            if (!response.ok) {
                const errorMsg = data.message || "Erro desconhecido ao realizar login.";
                authMsg.innerText = errorMsg;
                throw new Error(`Erro ao realizar Login: ${errorMsg}`);
            } else {
                console.log("[login.html] | Sucesso!");
                setItem("JPWG_USER", JSON.stringify(data));

                window.location = "./park.html";
            }
        }))
        .catch((err) => {
            console.error("[login.html] | Falha no login:", err.message);
        });
    });
</script>
</body>
</html>

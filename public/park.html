<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurassic Park: Web Genesis</title>

    <!-- === Importação de Estilos === -->
    <link rel="stylesheet" href="./styles/global.css">
    <link rel="stylesheet" href="./styles/park.css">
    <link rel="stylesheet" href="./styles/dev.css">
    
    <!-- === Importação de funções === -->
    <script defer src="./scripts/utils/storage.js"></script>
    <script defer src="./scripts/events.js"></script>

    <!-- === Importação de Bibliotecas === -->
    <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/index.min.js"></script>
</head>
<body>
    <div id="dev-screen" class="closed">
        <div class="dev-screen-header">
            <h3 class="title">Tela do Desenvolvedor</h3>
        </div>
        <div class="dev-screen-body">
            <ul class="dev-items">
                <li class="dev-item">
                    <p class="dev-item-title">PARQUE NOME</p>
                    <input id="ipt-park-name" type="text">
                    <button id="changeParkName-btn">Alterar Nome</button>
                </li>
                <li class="dev-item">
                    <p class="dev-item-title">PARQUE AVALIAÇÃO</p>
                    <input id="ipt-park-rating" type="number" min="0" max="5" step="0.5">
                    <button id="changeParkRating-btn">Alterar Avaliação</button>
                </li>
                <li class="dev-item">
                    <p class="dev-item-title">PARQUE SALDO</p>
                    <input id="ipt-park-balance" type="number" min="0" max="5" step="0.5">
                    <button id="changeParkBalance-btn">Alterar saldo</button>
                </li>
            </ul>
        </div>
        <div class="dev-screen-footer">
                <div class="dev-item">
                    <p class="dev-item-title">AUTOSAVE</p>
                    <p>Próximo Autosave em: <span id="autosave-timer"></span></p>
                    <button id="manualsave-btn">Salvar Manualmente</button>
                </div>
        </div>
    </div>
    <!-- Sidebar -->
    <aside id="sidebar" class="closed">
        <button id="sidebar-toggler">
            <i class="ph-fill ph-caret-circle-right"></i>
        </button>
        <div class="sidebar-header">
            <h1 class="logo font-jurassic">
                <span>Jurassic Park</span>
                <span>Web Genesis</span>
            </h1>
        </div>
        <nav class="sidebar-body">
            <button id="general-btn" class="sidebar-item">
                <i class="ph-fill ph-cards"></i>
                <p>Visão Geral</p>
            </button>
            <button id="buildings-btn" class="sidebar-item">
                <i class="ph-fill ph-blueprint"></i>
                <p>Construções</p>
            </button>
            <button id="autosave-btn" class="sidebar-item">
                <i class="ph-fill ph-floppy-disk"></i>
                <p>Salvar</p>
            </button>
        </nav>
        <div class="sidebar-footer">
            <button id="logout-btn">
                <i class="ph-fill ph-sign-out"></i>
                <p>Sair</p>
            </button>
        </div>
    </aside>
    <!-- Status Bar -->
    <aside class="statusbar">
        <div id="park-name"></div>
        <div id="park-rating"></div>
        <div id="park-balance"></div>
    </aside>
    <!-- GRID -->
    <main class="grid-wrapper">
        <div id="grid">
            <div class="row row-1"></div>
            <div class="row row-2"></div>
            <div class="row row-3"></div>
            <div class="row row-4"></div>
            <div class="row row-5"></div>
        </div>
    </main>
<!-- === SCRIPTS LOCAIS === -->
<script>
// === VARIÁVES === //
const GRID_MAX_COLS = 5;
const GRID_MAX_ROWS = 4;

const AUTOSAVE_INTERVAL_MS = 1 * 60 * 1000; // [min] * [sec] * [ms]
const INCREASE_BALANCE_INTERVAL_MS = 1 * 5 * 1000;
const EVENTS_INTERVAL_MS = 1 * 30 * 1000;

document.addEventListener("keydown", (e) => toggleDevScreen(e));
document.addEventListener("DOMContentLoaded", () => {
    // === REDIRECIONAMENTO SE NÃO AUTENTICADO === //
    if(!getItem("JPWG_DATA")) {
       window.location = "./login.html";
    }

    // === ELEMENTOS HTML e EVENTOS === //
    const grid = document.getElementById("grid");

    // devScreen Elements //
    const devScreen = document.getElementById("dev-screen");
    const iptParkName = document.getElementById("ipt-park-name");
    const iptParkRating = document.getElementById("ipt-park-rating");
    const iptParkBalance = document.getElementById("ipt-park-balance");
    const changeParkNameBtn = 
        getElementByIdAndAttachEvent("changeParkName-btn", 'click', () => updatePark('name', iptParkName.value));
    const changeParkRatingBtn = 
        getElementByIdAndAttachEvent("changeParkRating-btn", 'click', () => updatePark('rating', iptParkRating.value));
    const changeParkBalanceBtn = 
        getElementByIdAndAttachEvent("changeParkBalance-btn", 'click', () => updatePark('dinoCoins', iptParkBalance.value));
    const manualSaveBtn = getElementByIdAndAttachEvent("manualsave-btn", 'click', () => triggerEvent("save"));
    
    // Sidebar Elements //
    const sidebarTogglerBtn = getElementByIdAndAttachEvent("sidebar-toggler", 'click', toggleSidebar);
    const generalBtn = getElementByIdAndAttachEvent("general-btn", 'click', toggleGeneralPanel);
    const buildingsBtn = getElementByIdAndAttachEvent("buildings-btn", 'click', toggleBuildingsPanel);
    const autoSaveBtn = getElementByIdAndAttachEvent("autosave-btn", 'click', () => triggerEvent("save"));
    const logoutBtn = getElementByIdAndAttachEvent("logout-btn", 'click', logout);
    
    // Statusbar Elements //
    const parkNameDiv = getElementByIdAndAttachEvent("park-name", "storage", (e) => {
        const {park} = JSON.parse(getItem("JPWG_DATA"));
        this.innerHTML = park.name;
    });
    const parkRatingDiv = getElementByIdAndAttachEvent("park-rating", "storage", (e) => {
        console.log("HEYA")
        const {park} = JSON.parse(getItem("JPWG_DATA"));
        loadRatingStars(park.rating);
    });
    const parkBalanceDiv = getElementByIdAndAttachEvent("park-balance", "storage", (e) => {
        const {park} = JSON.parse(getItem("JPWG_DATA"));
        this.innerHTML = park.dinoCoins;
    });

    // === GAME LOOP === //
    // 1. Recebe informações do sessionStorage e cria uma Cópia
    const data = JSON.parse(getItem("JPWG_DATA"));
    triggerEvent("printStorage", ["JPWG_DATA"]);

    // 2. Iniciar Timers (Autosave, dinoCoins, Eventos)
    const autoSaveTimer = setInterval(() => triggerEvent("save"), AUTOSAVE_INTERVAL_MS);
    const increaseBalanceTimer = setInterval(() => triggerEvent("increaseBalance"), INCREASE_BALANCE_INTERVAL_MS); 
    const eventsTimer = setInterval(() => triggerEvent("randomEvent"), EVENTS_INTERVAL_MS); 

    // 3. Montar Grid(5x4)
    data.tiles.forEach((tile) => {
        const t = document.createElement("div");
        const tCol = tile.position_col;
        const tRow = tile.position_row;
        t.classList.add("tile", tile.category, tile.name);

        data.dinosaur.forEach((dino) => {
            if(dino.tile_col == tCol && dino.tile_row == tRow) {
                const d = document.createElement("div");
                d.classList.add("dinosaur", dino.name);
                t.appendChild(d);
            }
        });

        const row = document.querySelector(`.row.row-${tRow + 1}`)
        row.appendChild(t);
    });

    // 4. Atribuir informações do Parque (Avaliação, Nome, Saldo)
    let parkName = data.park.name;
    let parkRating = data.park.rating;
    let parkBalance = data.park.dinoCoins;

    iptParkName.value = parkName;
    iptParkRating.value = parkRating;
    iptParkBalance.value = parkBalance;

    // 4.1 Avaliação 
    loadRatingStars(parkRating);

    // 4.2 Saldo 
    document.getElementById("park-balance").innerHTML = `
    <i class="ph-fill ph-coins"></i>
    ${Number(parkBalance).toLocaleString("pt-br")}`;

    // 4.3 Nome 
    document.getElementById("park-name").innerHTML = `
        <i class="ph-fill ph-info"></i>
        ${parkName}`;

});

// === FUNÇÕES UTILITÁRIAS === //
function getElementByIdAndAttachEvent(elementId, event, fn) {
    const element = document.getElementById(elementId);
    if(!element) return;

    element.addEventListener(event, fn);
    return element;
}

function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    if(sidebar.classList.contains("open")) {
        sidebar.classList.replace("open", "closed");
        document.querySelector("#sidebar-toggler i").classList.replace("ph-caret-circle-left", "ph-caret-circle-right");
    } else {
        sidebar.classList.replace("closed", "open");
        document.querySelector("#sidebar-toggler i").classList.replace("ph-caret-circle-right", "ph-caret-circle-left");
    }
}

function toggleGeneralPanel() {}

function toggleBuildingsPanel() {}

function toggleDevScreen(event) {
    if((event.ctrlKey || event.metaKey) && event.key === "k") {
        const devScreen = document.getElementById("dev-screen");
        if(devScreen.classList.contains("open")) {
            devScreen.classList.replace("open", "closed")
        } else {
            devScreen.classList.replace("closed", "open")
        }
    }
}

function logout() {
    clearStorage();
    setTimeout(() => {
        window.location = "./login.html";
    }, 250);
}

function updatePark(field, value) {
    console.log(`ATUALIZANDO PARQUE: ${field}`);
    let data = JSON.parse(getItem("JPWG_DATA"));
    data.park[field] = value;
    setItem("JPWG_DATA", JSON.stringify(data));
}

function loadRatingStars(rating) {
    for (let i = 0; i < 5; i++) {
        const star = document.createElement("i");
        if(rating - i === 0.5) {
            star.classList.add("rating", "ph-fill", "ph-star-half");
        } else if(rating - i <= 0) {
            star.classList.add("rating", "ph", "ph-star");
        }
        else {
            star.classList.add("rating", "ph-fill", "ph-star");
        }
        document.getElementById("park-rating").appendChild(star);
    }
}

</script>
</body>
</html>
